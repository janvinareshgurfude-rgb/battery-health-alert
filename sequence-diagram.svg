<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1000" height="620" fill="#1B2430"/>
  <text x="500" y="30" fill="#EAF0F6" font-size="18" font-weight="700" text-anchor="middle">Sequence: Low-SoC Reading Triggers a Battery Alert</text>

  <g font-size="12" fill="#EAF0F6">
    <text x="80" y="60" text-anchor="middle" font-weight="600">Sensor Sim</text>
    <text x="240" y="60" text-anchor="middle" font-weight="600">Kuksa</text>
    <text x="400" y="60" text-anchor="middle" font-weight="600">Bridge</text>
    <text x="540" y="60" text-anchor="middle" font-weight="600">eCAL</text>
    <text x="680" y="60" text-anchor="middle" font-weight="600">Connector</text>
    <text x="830" y="60" text-anchor="middle" font-weight="600">Ditto</text>
    <text x="950" y="60" text-anchor="middle" font-weight="600">Alert-Monitor</text>
  </g>
  <g stroke="#3A4756" stroke-width="1.5">
    <line x1="80" y1="70" x2="80" y2="590"/>
    <line x1="240" y1="70" x2="240" y2="590"/>
    <line x1="400" y1="70" x2="400" y2="590"/>
    <line x1="540" y1="70" x2="540" y2="590"/>
    <line x1="680" y1="70" x2="680" y2="590"/>
    <line x1="830" y1="70" x2="830" y2="590"/>
    <line x1="950" y1="70" x2="950" y2="590"/>
  </g>

  <g stroke="#4CAF7D" stroke-width="1.5" fill="none" marker-end="url(#a)">
    <line x1="80" y1="100" x2="240" y2="100"/>
  </g>
  <text x="160" y="94" fill="#CBD6E0" font-size="11" text-anchor="middle">setValue(SoC=12%) [gRPC]</text>

  <g stroke="#4CAF7D" stroke-width="1.5" fill="none" marker-end="url(#a)">
    <line x1="240" y1="150" x2="400" y2="150"/>
  </g>
  <text x="320" y="144" fill="#CBD6E0" font-size="11" text-anchor="middle">onSignalChanged(SoC=12%) [subscribe cb]</text>

  <g stroke="#4CAF7D" stroke-width="1.5" fill="none" marker-end="url(#a)">
    <line x1="400" y1="200" x2="540" y2="200"/>
  </g>
  <text x="470" y="194" fill="#CBD6E0" font-size="11" text-anchor="middle">publish("battery/soc", 12%)</text>

  <g stroke="#4CAF7D" stroke-width="1.5" fill="none" marker-end="url(#a)">
    <line x1="540" y1="250" x2="680" y2="250"/>
  </g>
  <text x="610" y="244" fill="#CBD6E0" font-size="11" text-anchor="middle">onMessage(soc=12%)</text>

  <g stroke="#4CAF7D" stroke-width="1.5" fill="none" marker-end="url(#a)">
    <line x1="680" y1="300" x2="830" y2="300"/>
  </g>
  <text x="755" y="294" fill="#CBD6E0" font-size="11" text-anchor="middle">PATCH /things/hag:vehicle-01</text>
  <text x="755" y="308" fill="#CBD6E0" font-size="10" text-anchor="middle">features/battery.soc = 12</text>

  <rect x="830" y="330" width="140" height="46" rx="6" fill="#24303F" stroke="#4C7DAF"/>
  <text x="900" y="350" fill="#EAF0F6" font-size="11" text-anchor="middle">evaluate rule:</text>
  <text x="900" y="365" fill="#EAF0F6" font-size="11" text-anchor="middle">soc under 15 -&gt; alert=true</text>

  <g stroke="#E15554" stroke-width="1.5" fill="none" marker-end="url(#b)">
    <line x1="830" y1="400" x2="950" y2="400"/>
  </g>
  <text x="890" y="394" fill="#F3B6B6" font-size="11" text-anchor="middle">WS event: batteryAlert=true</text>

  <rect x="880" y="420" width="110" height="46" rx="6" fill="#3A1F1F" stroke="#E15554"/>
  <text x="935" y="440" fill="#F3B6B6" font-size="11" text-anchor="middle">render banner,</text>
  <text x="935" y="455" fill="#F3B6B6" font-size="11" text-anchor="middle">log alert entry</text>

  <text x="500" y="510" fill="#8CA0B3" font-size="11" text-anchor="middle">Measured end-to-end latency = timestamp(Alert-Monitor log entry) minus timestamp(Sensor Sim publish)</text>
  <text x="500" y="530" fill="#8CA0B3" font-size="11" text-anchor="middle">Hysteresis (added in Iteration 1 modification): alert clears only once soc rises above 18%,</text>
  <text x="500" y="548" fill="#8CA0B3" font-size="11" text-anchor="middle">preventing rapid true/false flapping right at the 15% boundary.</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#4CAF7D"/></marker>
    <marker id="b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#E15554"/></marker>
  </defs>
</svg>
