<svg viewBox="0 0 1000 460" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1000" height="460" fill="#1B2430"/>
  <text x="500" y="34" fill="#EAF0F6" font-size="20" font-weight="700" text-anchor="middle">Battery Health Alert -- Implemented System Architecture (Iteration 1)</text>

  <rect x="30" y="150" width="150" height="90" rx="8" fill="#2E3A47" stroke="#8CA0B3"/>
  <text x="105" y="185" fill="#EAF0F6" font-size="13" text-anchor="middle" font-weight="600">Sensor Simulator</text>
  <text x="105" y="203" fill="#8CA0B3" font-size="11" text-anchor="middle">sensor_simulator.py</text>
  <text x="105" y="219" fill="#8CA0B3" font-size="11" text-anchor="middle">gRPC -> Kuksa</text>

  <rect x="220" y="150" width="150" height="90" rx="8" fill="#233246" stroke="#4C7DAF"/>
  <text x="295" y="180" fill="#EAF0F6" font-size="13" text-anchor="middle" font-weight="600">Eclipse Kuksa</text>
  <text x="295" y="198" fill="#8CA0B3" font-size="11" text-anchor="middle">Databroker (VSS)</text>
  <text x="295" y="214" fill="#8CA0B3" font-size="10" text-anchor="middle">Vehicle.Powertrain.Traction-</text>
  <text x="295" y="227" fill="#8CA0B3" font-size="10" text-anchor="middle">Battery.StateOfCharge.Current</text>

  <rect x="410" y="150" width="150" height="90" rx="8" fill="#2E3A47" stroke="#8CA0B3"/>
  <text x="485" y="180" fill="#EAF0F6" font-size="13" text-anchor="middle" font-weight="600">Kuksa-eCAL Bridge</text>
  <text x="485" y="198" fill="#8CA0B3" font-size="11" text-anchor="middle">subscribes VSS signal,</text>
  <text x="485" y="213" fill="#8CA0B3" font-size="11" text-anchor="middle">republishes on eCAL topic</text>
  <text x="485" y="228" fill="#8CA0B3" font-size="10" text-anchor="middle">topic: battery/soc</text>

  <rect x="600" y="150" width="130" height="90" rx="8" fill="#233246" stroke="#4C7DAF"/>
  <text x="665" y="185" fill="#EAF0F6" font-size="13" text-anchor="middle" font-weight="600">Eclipse eCAL</text>
  <text x="665" y="203" fill="#8CA0B3" font-size="11" text-anchor="middle">pub/sub transport</text>
  <text x="665" y="219" fill="#8CA0B3" font-size="10" text-anchor="middle">(protobuf message)</text>

  <rect x="770" y="150" width="180" height="90" rx="8" fill="#2E3A47" stroke="#8CA0B3"/>
  <text x="860" y="180" fill="#EAF0F6" font-size="13" text-anchor="middle" font-weight="600">eCAL-Ditto Connector</text>
  <text x="860" y="198" fill="#8CA0B3" font-size="11" text-anchor="middle">subscribes eCAL topic,</text>
  <text x="860" y="213" fill="#8CA0B3" font-size="11" text-anchor="middle">PATCH to Ditto REST API</text>

  <g stroke="#4CAF7D" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="180" y1="195" x2="220" y2="195"/>
    <line x1="370" y1="195" x2="410" y2="195"/>
    <line x1="560" y1="195" x2="600" y2="195"/>
    <line x1="730" y1="195" x2="770" y2="195"/>
  </g>

  <rect x="770" y="280" width="180" height="100" rx="8" fill="#233246" stroke="#4C7DAF"/>
  <text x="860" y="308" fill="#EAF0F6" font-size="13" text-anchor="middle" font-weight="600">Eclipse Ditto</text>
  <text x="860" y="326" fill="#8CA0B3" font-size="11" text-anchor="middle">Thing: hag:vehicle-01</text>
  <text x="860" y="342" fill="#8CA0B3" font-size="11" text-anchor="middle">feature battery.soc +</text>
  <text x="860" y="357" fill="#8CA0B3" font-size="11" text-anchor="middle">hysteresis alert rule</text>

  <line x1="860" y1="240" x2="860" y2="280" stroke="#4CAF7D" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="540" y="280" width="180" height="100" rx="8" fill="#1F3B2C" stroke="#4CAF7D"/>
  <text x="630" y="308" fill="#EAF0F6" font-size="13" text-anchor="middle" font-weight="600">Alert-Monitor App</text>
  <text x="630" y="326" fill="#8CA0B3" font-size="11" text-anchor="middle">WebSocket client</text>
  <text x="630" y="342" fill="#8CA0B3" font-size="11" text-anchor="middle">renders SoC + alert</text>
  <text x="630" y="357" fill="#8CA0B3" font-size="11" text-anchor="middle">state, logs history</text>

  <line x1="770" y1="330" x2="720" y2="330" stroke="#4CAF7D" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="745" y="322" fill="#8CA0B3" font-size="9" text-anchor="middle">change</text>
  <text x="745" y="345" fill="#8CA0B3" font-size="9" text-anchor="middle">notify</text>

  <rect x="30" y="280" width="480" height="70" rx="8" fill="none" stroke="#E8A33D" stroke-dasharray="5,3"/>
  <text x="270" y="308" fill="#E8A33D" font-size="12" text-anchor="middle" font-weight="600">Eclipse openDuT -- Test Orchestration Layer</text>
  <text x="270" y="326" fill="#8CA0B3" font-size="11" text-anchor="middle">Drives sensor_simulator.py through scripted low-SoC runs;</text>
  <text x="270" y="340" fill="#8CA0B3" font-size="11" text-anchor="middle">polls Ditto + Alert-Monitor log to verify correctness/latency</text>
  <line x1="105" y1="280" x2="105" y2="240" stroke="#E8A33D" stroke-width="1.5" stroke-dasharray="4,3"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4CAF7D"/>
    </marker>
  </defs>

  <text x="500" y="430" fill="#8CA0B3" font-size="11" text-anchor="middle">All components deployed via Docker Compose on a shared bridge network; Ditto backed by MongoDB.</text>
</svg>
